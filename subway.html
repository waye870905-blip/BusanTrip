<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>釜山行｜地鐵指南</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=2" />
</head>
<script src="app.js?v=2"></script>
<script src="subway.js?v=2"></script>
<body>

  <!-- top bar -->
  <div class="top-bar">
    <div class="container top-bar-inner">
      <div class="top-item">
        🇰🇷 韓國時間：
        <span id="korea-time">--:--:--</span>
      </div>

      <div class="top-item">
        🌤 釜山天氣：
        <span id="weather-main">--°C</span>
        <span id="weather-sub" class="top-sub"></span>
      </div>
    </div>
  </div>

  <!-- nav -->
  <nav class="nav">
    <div class="container nav-inner">
      <a class="brand" href="index.html">🇰🇷 釜山行</a>

       <button class="nav-toggle" id="nav-toggle" type="button">
      ☰
    </button>

      <div class="nav-links" id="nav-links">
        <a href="itinerary.html">行程表</a>
        <a href="travel-info.html">旅遊資訊</a>
        <a href="notes.html">注意事項</a>
        <a href="subway.html" class="active">地鐵指南</a>
        <a href="expense.html">旅費記錄</a>
      </div>
    </div>
  </nav>

  <!-- main -->
  <main>
    <section class="section">
      <div class="container">

         <section class="section" id="subway-info">
  <div class="container">
    <div class="section-head">
      <h2>地鐵資訊</h2>
      
    </div>

    <div class="subway-layout">
      <div class="card planner-card planner-dark">
        <div class="planner-title-wrap">
          <h3>釜山地鐵路線規劃</h3>
          <p>Busan Metro 完整站點版</p>
        </div>

        <div class="planner-form">
          <div class="planner-line"></div>

          <div class="planner-field-wrap">
            <label for="from-station">出發站</label>
            <select id="from-station" class="planner-select">
              <option value="">請選擇出發站...</option>
            </select>
          </div>

          <div class="planner-field-wrap">
            <label for="to-station">目的站</label>
            <select id="to-station" class="planner-select">
              <option value="">請選擇目的站...</option>
            </select>
          </div>

          <button id="plan-route-btn" class="planner-btn" type="button">
            開始規劃路線
          </button>
        </div>
      </div>

      <div class="card planner-result-card-dark" id="planner-result-card" style="display:none;">
        <div class="result-top">
          <div class="result-stat">
            <span class="result-label">總計經過</span>
            <strong id="route-stops">--</strong>
          </div>

          <div class="result-stat">
            <span class="result-label">預估時間</span>
            <strong id="route-duration">--</strong>
          </div>
        </div>

        <div class="result-route">
          <div class="result-station">
            <span class="dot start"></span>
            <div>
              <div class="station-label">起點</div>
              <div class="station-name" id="route-from">--</div>
            </div>
          </div>

          <div class="result-middle">
            <div class="route-pill" id="route-line">--</div>
            <div class="route-note" id="route-note">--</div>
          </div>

          <div class="result-station">
            <span class="dot end"></span>
            <div>
              <div class="station-label">終點</div>
              <div class="station-name" id="route-to">--</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>  
        
        <!-- planner -->
        <div class="subway-layout">
          <!--（這裡貼你原本那整大段 metro html）-->
        </div>

      </div>
    </section>
  </main>

  <!-- footer -->
  <footer class="footer">
    <div class="container">
      Busan Metro Planner
    </div>
  </footer>

</body>
</html>
