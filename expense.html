<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>旅費記錄｜釜山行</title>
  <link rel="stylesheet" href="styles.css?v=10" />
</head>
<body>
  <header class="top-bar">
    <div class="top-bar-inner">
      <span id="live-date">韓國時間載入中...</span>
      <span id="weather">釜山天氣載入中...</span>
    </div>
  </header>

  <nav class="main-nav">
    <a href="index.html">首頁</a>
    <a href="trip-info.html">旅遊資訊</a>
    <a href="subway.html">地鐵資訊</a>
    <a href="expense.html" class="active">旅費記錄</a>
  </nav>

  <section class="page-head page-head-cover trip-cover trip-cover-expense">
    <div class="page-head-overlay">
      <div class="container">
        <h1>旅費記錄</h1>
        <p class="cover-subtitle">把整趟釜山行的花費整理清楚</p>
      </div>
    </div>
  </section>

  <main class="container expense-page">
    <section class="card expense-summary-card">
      <div class="expense-summary-grid">
        <div class="summary-box">
          <span class="summary-label">總筆數</span>
          <strong id="expense-count">0</strong>
        </div>
        <div class="summary-box">
          <span class="summary-label">總花費（KRW）</span>
          <strong id="expense-total-krw">₩0</strong>
        </div>
        <div class="summary-box">
          <span class="summary-label">總花費（TWD）</span>
          <strong id="expense-total-twd">NT$0</strong>
        </div>
      </div>
    </section>

    <section class="card expense-form-card">
      <h2>新增支出</h2>
      <form id="expense-form" class="expense-form">
        <div class="form-row">
          <div class="form-group">
            <label for="expense-date">日期</label>
            <input type="date" id="expense-date" required />
          </div>

          <div class="form-group">
            <label for="expense-category">分類</label>
            <select id="expense-category" required>
              <option value="交通">交通</option>
              <option value="餐飲">餐飲</option>
              <option value="門票">門票</option>
              <option value="購物">購物</option>
              <option value="住宿">住宿</option>
              <option value="其他">其他</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="expense-item">項目</label>
            <input type="text" id="expense-item" placeholder="例如：Uber 到白淺灘" required />
          </div>

          <div class="form-group">
            <label for="expense-amount">金額（韓元）</label>
            <input type="number" id="expense-amount" min="0" step="1" placeholder="例如：12000" required />
          </div>
        </div>

        <div class="form-row single">
          <div class="form-group">
            <label for="expense-note">備註</label>
            <input type="text" id="expense-note" placeholder="可不填，例如：4人分 / 每人平均" />
          </div>
        </div>

        <div class="form-row form-actions">
          <div class="form-group rate-group">
            <label for="exchange-rate">匯率（1 KRW = ? TWD）</label>
            <input type="number" id="exchange-rate" min="0" step="0.0001" value="0.023" />
          </div>

          <button type="submit" class="btn-primary">新增費用</button>
        </div>
      </form>
    </section>

    <section class="card expense-list-card">
      <div class="expense-list-head">
        <h2>費用明細</h2>
        <button id="clear-expenses" class="btn-danger" type="button">清空全部</button>
      </div>

      <div class="expense-table-wrap">
        <table class="expense-table">
          <thead>
            <tr>
              <th>日期</th>
              <th>分類</th>
              <th>項目</th>
              <th>金額（KRW）</th>
              <th>換算（TWD）</th>
              <th>備註</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="expense-tbody">
            <tr class="empty-row">
              <td colspan="7">目前還沒有任何費用記錄</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="app.js?v=10"></script>
  <script src="expense.js?v=10"></script>
</body>
</html>
