<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>釜山行｜旅費記錄</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=11" />
</head>
<body>

  <div class="top-bar">
    <div class="container top-bar-inner">
      <div class="top-item">
        🇰🇷 韓國時間：
        <span id="korea-time">--:--:--</span>
      </div>
      <div class="top-item">
        🌤 釜山天氣：
        <span id="weather-main">--°C</span>
        <span id="weather-sub" class="top-sub"></span>
      </div>
    </div>
  </div>

  <nav class="nav">
    <div class="container nav-inner">
      <a class="brand" href="index.html">🇰🇷 釜山行</a>

   <button class="nav-toggle" id="nav-toggle" type="button">
      ☰
    </button>
      
      <div class="nav-links">
        <a href="itinerary.html">行程表</a>
        <a href="travel-info.html">旅遊資訊</a>
        <a href="notes.html">注意事項</a>
        <a href="subway.html">地鐵指南</a>
        <a href="expense.html" class="active">旅費記錄</a>
      </div>
    </div>
  </nav>

  <section class="page-head page-head-cover trip-cover trip-cover-expense">
    <div class="page-head-overlay">
      <div class="container">
        <h1>旅費記錄</h1>
      </div>
    </div>
  </section>

  <main class="container expense-page">
    <section class="card expense-summary-card">
      <div class="expense-summary-grid">
        <div class="summary-box">
          <span class="summary-label">總筆數</span>
          <strong id="expense-count">0</strong>
        </div>
        <div class="summary-box">
          <span class="summary-label">總花費（KRW）</span>
          <strong id="expense-total-krw">₩0</strong>
        </div>
        <div class="summary-box">
          <span class="summary-label">總花費（TWD）</span>
          <strong id="expense-total-twd">NT$0</strong>
        </div>
      </div>
    </section>

    <section class="card expense-form-card">
      <h2>新增支出</h2>
      <form id="expense-form" class="expense-form">
        <div class="form-row form-row-3">
  <div class="form-group">
    <label for="expense-date">日期</label>
    <input type="date" id="expense-date" required />
  </div>

  <div class="form-group">
    <label for="expense-category">分類</label>
    <select id="expense-category" required>
      <option value="交通">交通</option>
      <option value="餐飲">餐飲</option>
      <option value="門票">門票</option>
      <option value="購物">購物</option>
      <option value="住宿">住宿</option>
      <option value="其他">其他</option>
    </select>
  </div>

  <div class="form-group">
    <label for="expense-person">誰付款</label>
    <select id="expense-person" required>
      <option value="拔拔">拔拔</option>
      <option value="麻麻">麻麻</option>
      <option value="哥哥">哥哥</option>
      <option value="屁屁">屁屁</option>
    </select>
  </div>
</div>

        <div class="form-row form-row-3">
  <div class="form-group form-group-wide">
    <label for="expense-item">項目</label>
    <input type="text" id="expense-item" placeholder="例如：Uber 到白淺灘" required />
  </div>

  <div class="form-group">
    <label for="expense-amount">金額（韓元）</label>
    <input type="number" id="expense-amount" min="0" step="1" placeholder="例如：12000" />
  </div>

  <div class="form-group">
    <label for="expense-amount-twd">金額（台幣）</label>
    <input type="number" id="expense-amount-twd" min="0" step="1" placeholder="例如：300" />
  </div>
</div>

        <div class="form-row single">
          <div class="form-group">
            <label for="expense-note">備註</label>
            <input type="text" id="expense-note" placeholder="可不填，例如：4人分 / 每人平均" />
          </div>
        </div>

        <div class="form-row form-actions">
          <div class="form-group rate-group">
            <label for="exchange-rate">匯率（1 KRW = ? TWD）</label>
            <input type="number" id="exchange-rate" min="0" step="0.0001" value="0.023" />
          </div>

          <button type="submit" class="btn-primary">新增費用</button>
        </div>
      </form>
    </section>

    <section class="card expense-list-card">
      <div class="expense-list-head">
        <h2>費用明細</h2>
        <button id="clear-expenses" class="btn-danger" type="button">清空全部</button>
      </div>

      <div class="expense-table-wrap">
        <table class="expense-table">
          <thead>
            <tr>
  <th>日期</th>
  <th>分類</th>
  <th>誰付款</th>
  <th>項目</th>
  <th>金額（KRW）</th>
  <th>金額（TWD）</th>
  <th>備註</th>
  <th>操作</th>
</tr>
          </thead>
          <tbody id="expense-tbody">
            <tr class="empty-row">
              <td colspan="8">目前還沒有任何費用記錄</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
    <section class="card expense-person-summary-card">
  <div class="expense-list-head">
    <h2>付款人統計</h2>
  </div>

  <div class="expense-table-wrap">
    <table class="expense-table">
      <thead>
        <tr>
          <th>付款人</th>
          <th>總金額（KRW）</th>
          <th>金額（TWD）</th>
        </tr>
      </thead>
      <tbody id="person-summary-tbody">
        <tr class="empty-row">
          <td colspan="3">目前還沒有任何費用記錄</td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
  </main>

  <script src="app.js?v=11"></script>
  <script src="expense.js?v=11"></script>
</body>
</html>
